<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Offline Local Video Player</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; }
        video { width: 90%; max-width: 800px; margin-top: 20px; background: black; }
        .picker { margin: 20px; padding: 10px; background: #333; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

    <h1>My Offline Video Player</h1>
    
    <div class="picker">
        <label for="videoFile">Choose a video from your phone: </label>
        <input type="file" id="videoFile" accept="video/*">
    </div>

    <br>
    <video id="player" controls></video>

    <script>
        const fileInput = document.getElementById('videoFile');
        const videoPlayer = document.getElementById('player');

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                // Creates a local blob URL pointing directly to your phone's memory
                const fileURL = URL.createObjectURL(file);
                videoPlayer.src = fileURL;
                videoPlayer.play();
            }
        });
    </script>

</body>
</html>
